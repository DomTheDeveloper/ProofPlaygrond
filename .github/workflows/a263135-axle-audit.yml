name: A263135 AXLE audit

on:
  push:
    branches: [audit-run/a263135-6ad03f2a]
    paths:
      - '.github/workflows/a263135-axle-audit.yml'
      - 'audits/axle_a263135.py'
      - 'audits/axle_a263135_v2.py'
      - 'audits/A263135.md'
  pull_request:
    branches: [audit-base/a263135-axle-6ad03f2a]
    paths:
      - '.github/workflows/a263135-axle-audit.yml'
      - 'audits/axle_a263135.py'
      - 'audits/axle_a263135_v2.py'
      - 'audits/A263135.md'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: a263135-axle-current-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify current A263135 theorem with AXLE
    runs-on: ubuntu-slim
    timeout-minutes: 25
    steps:
      - name: Checkout Proof Playground harness
        uses: actions/checkout@v6
        with:
          path: playground
          show-progress: false

      - name: Checkout current A263135 proof branch
        uses: actions/checkout@v6
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: agent/solve-oeis-a263135
          path: formal-conjectures
          show-progress: false

      - name: Flatten and verify with AXLE Lean 4.27
        env:
          A263135_FLAT_OUTPUT: ${{ runner.temp }}/A263135Flat.lean
          A263135_AXLE_OUTPUT: ${{ runner.temp }}/a263135-axle.json
          A263135_AXLE_CONSOLE: ${{ runner.temp }}/a263135-axle-console.log
        shell: bash
        run: |
          set +e
          python3 playground/audits/axle_a263135_v2.py formal-conjectures \
            >"$A263135_AXLE_CONSOLE" 2>&1
          status=$?
          cat "$A263135_AXLE_CONSOLE"
          echo "A263135_AXLE_STATUS=$status" >> "$GITHUB_ENV"
          exit 0

      - name: Publish concise AXLE result to audit branch
        if: always() && github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          proof_sha=$(git -C formal-conjectures rev-parse HEAD 2>/dev/null || echo unknown)
          export PROOF_SHA="$proof_sha"
          export AXLE_STATUS="${A263135_AXLE_STATUS:-setup-failed}"
          export AXLE_JSON="$RUNNER_TEMP/a263135-axle.json"
          export AXLE_CONSOLE="$RUNNER_TEMP/a263135-axle-console.log"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          out = Path('playground/audits/A263135_AXLE_SUMMARY.log')
          lines = [
              f"Proof commit: {os.environ['PROOF_SHA']}",
              f"AXLE status: {os.environ['AXLE_STATUS']}",
              "",
          ]
          path = Path(os.environ['AXLE_JSON'])
          if path.exists():
              data = json.loads(path.read_text())
              lines.append(f"okay: {data.get('okay')}")
              errors = data.get('lean_messages', {}).get('errors', [])
              warnings = data.get('lean_messages', {}).get('warnings', [])
              tool_errors = data.get('tool_messages', {}).get('errors', [])
              failed = data.get('failed_declarations', [])
              lines.extend([
                  f"lean errors: {len(errors)}",
                  f"lean warnings: {len(warnings)}",
                  f"tool errors: {len(tool_errors)}",
                  f"failed declarations: {len(failed)}",
                  "",
              ])
              for label, values in (
                  ('LEAN ERROR', errors),
                  ('TOOL ERROR', tool_errors),
                  ('FAILED DECLARATION', failed),
              ):
                  for index, value in enumerate(values, 1):
                      lines.append(f"--- {label} {index} ---")
                      lines.append(str(value))
                      lines.append("")
          else:
              lines.append('AXLE JSON was not produced.')
              console = Path(os.environ['AXLE_CONSOLE'])
              if console.exists():
                  lines.append(console.read_text()[-20000:])
          out.write_text('\n'.join(lines))
          PY
          cd playground
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add audits/A263135_AXLE_SUMMARY.log
          if ! git diff --cached --quiet; then
            git commit -m "audit(A263135): publish concise AXLE result"
            git push origin HEAD:audit-run/a263135-6ad03f2a
          fi

      - name: Upload AXLE transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a263135-axle-audit
          path: |
            ${{ runner.temp }}/A263135Flat.lean
            ${{ runner.temp }}/a263135-axle.json
            ${{ runner.temp }}/a263135-axle-console.log
          if-no-files-found: warn

      - name: Enforce AXLE result
        if: always()
        shell: bash
        run: test "${A263135_AXLE_STATUS:-1}" -eq 0
