name: A263135 AXLE audit

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/a263135-axle-audit.yml'
      - 'audits/axle_a263135.py'
      - 'audits/A263135.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: a263135-axle-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify exact repaired A263135 theorem with AXLE
    runs-on: ubuntu-slim
    timeout-minutes: 25
    steps:
      - name: Checkout Proof Playground harness
        uses: actions/checkout@v6
        with:
          path: playground

      - name: Checkout exact repaired A263135 proof source
        uses: actions/checkout@v6
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: 6ad03f2a0fa5de81c0ed08fd0fc38a42f12513b7
          path: formal-conjectures

      - name: Flatten and verify with AXLE Lean 4.27
        env:
          A263135_FLAT_OUTPUT: ${{ runner.temp }}/A263135Flat.lean
          A263135_AXLE_OUTPUT: ${{ runner.temp }}/a263135-axle.json
        run: python3 playground/audits/axle_a263135.py formal-conjectures

      - name: Upload AXLE transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a263135-axle-audit
          path: |
            ${{ runner.temp }}/A263135Flat.lean
            ${{ runner.temp }}/a263135-axle.json
          if-no-files-found: warn
