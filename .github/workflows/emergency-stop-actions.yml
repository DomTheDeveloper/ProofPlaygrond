name: Emergency stop all Actions runs

# Disabled after the one-time queue cleanup. Keeping this workflow dispatch-only and
# non-operative prevents it from cancelling proof-verification jobs that start later.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  disabled:
    name: Emergency stop disabled
    runs-on: ubuntu-latest
    steps:
      - run: echo 'Emergency cancellation is disabled. Use targeted cancellation instead.'
