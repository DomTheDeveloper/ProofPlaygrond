name: Migrate checkerboard all-n proof

on:
  push:
    branches:
      - migrate/checkerboard-alln-27a80067
    paths:
      - '.github/workflows/migrate-checkerboard-alln.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ProofPlaygrond migration branch
        uses: actions/checkout@v6
        with:
          ref: migrate/checkerboard-alln-27a80067
          fetch-depth: 0

      - name: Checkout frozen CRL proof source
        uses: actions/checkout@v6
        with:
          repository: DomTheDeveloper/crl
          ref: 27a800672db58c9fe0c3d02b48c798347fb02fd5
          path: _checkerboard_source
          persist-credentials: false

      - name: Copy exact all-n dependency closure
        run: |
          set -euo pipefail
          src='_checkerboard_source/proofs/lean/Checkerboard/Checkerboard'
          mkdir -p Checkerboard
          for file in \
            Model.lean \
            FiberSums.lean \
            FourCertificate.lean \
            QuadraticWeights.lean \
            PolynomialSums.lean \
            FinPolynomialSums.lean \
            QuadraticCosts.lean \
            AllNUpper.lean \
            N6Base.lean \
            AllNTheorem.lean; do
            cp "$src/$file" "Checkerboard/$file"
          done
          rm -rf _checkerboard_source

      - name: Commit exact migrated proof
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Checkerboard
          if git diff --cached --quiet; then
            echo 'Checkerboard proof files already match the frozen source.'
            exit 0
          fi
          git commit -m 'Migrate checkerboard all-n proof from frozen CRL commit'
          git push origin HEAD:migrate/checkerboard-alln-27a80067
