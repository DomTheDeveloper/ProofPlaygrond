name: OEIS A263135 clean submission audit

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/a263135-native-final.yml'
      - 'audits/A263135-native-final.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: one-file catalog build and scope audit
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout exact GDM-facing branch
        uses: actions/checkout@v6
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: e1f22c58af222484dbcecf3fbd2f0a9301e5a5a1
          fetch-depth: 0

      - name: Record exact commit
        run: git rev-parse HEAD | tee "$RUNNER_TEMP/resolved-sha.txt"

      - name: Enforce two-commit one-file scope
        run: |
          set -euo pipefail
          base=8eda3cc8ebd281bf7efa1c435a19ca6b87c6f4ff
          test "$(git rev-list --count "$base"..HEAD)" = 2
          mapfile -t changed < <(git diff --name-only "$base"..HEAD)
          printf '%s\n' "${changed[@]}" | tee "$RUNNER_TEMP/changed-files.txt"
          test "${#changed[@]}" = 1
          test "${changed[0]}" = 'FormalConjectures/OEIS/263135.lean'
          git diff --check "$base"..HEAD

      - name: Verify immutable proof reference
        run: |
          set -euo pipefail
          target='FormalConjectures/OEIS/263135.lean'
          grep -F 'category research solved' "$target"
          grep -F 'formal_proof using lean4' "$target"
          grep -F 'cb8de9921fc62810991a0384ee412cfed0ad8e7c/Scratch/A263135Final.lean' "$target"

      - name: Install repository-pinned Lean
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Restore Lean build cache
        uses: actions/cache@v4
        with:
          path: |
            .lake/packages
            .lake/build
          key: a263135-clean-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml') }}
          restore-keys: |
            a263135-${{ runner.os }}-

      - name: Restore pinned Mathlib cache
        run: |
          set -euo pipefail
          "$HOME/.elan/bin/lake" exe cache unpack || true
          "$HOME/.elan/bin/lake" exe cache get

      - name: Build clean catalog module
        run: |
          set -o pipefail
          "$HOME/.elan/bin/lake" build FormalConjectures.OEIS.263135 \
            2>&1 | tee "$RUNNER_TEMP/a263135-clean.log"

      - name: Upload clean-submission transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a263135-clean-submission-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/resolved-sha.txt
            ${{ runner.temp }}/changed-files.txt
            ${{ runner.temp }}/a263135-clean.log
          if-no-files-found: warn
