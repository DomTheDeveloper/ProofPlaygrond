name: OEIS A263135 native final audit

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/a263135-native-final.yml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/a263135-native-final.yml'
      - 'audits/A263135-native-final.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: native build and axiom audit
    runs-on: ubuntu-slim
    timeout-minutes: 120
    steps:
      - name: Checkout exact repaired proof source
        uses: actions/checkout@v6
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: 6ad03f2a0fa5de81c0ed08fd0fc38a42f12513b7
          fetch-depth: 1

      - name: Record exact commit
        run: git rev-parse HEAD | tee "$RUNNER_TEMP/resolved-sha.txt"

      - name: Install repository-pinned Lean
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Restore reusable Lean build cache
        uses: actions/cache@v4
        with:
          path: |
            .lake/packages
            .lake/build
          key: a263135-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}

      - name: Restore pinned Mathlib cache
        run: |
          set -euo pipefail
          "$HOME/.elan/bin/lake" exe cache unpack || true
          "$HOME/.elan/bin/lake" exe cache get

      - name: Reject proof placeholders and trust shortcuts
        run: |
          set -euo pipefail
          if grep -RInE '\b(sorry|admit|native_decide|unsafe)\b|(^|[^A-Za-z])axiom([^A-Za-z]|$)|Lean\.(trustCompiler|ofReduce|ofReduceBool)' Scratch/A263135*.lean; then
            echo 'Forbidden placeholder or trust shortcut found in A263135 proof modules.' >&2
            exit 1
          fi

      - name: Build complete A263135 module chain
        run: |
          set -euo pipefail
          python3 - <<'PY' > "$RUNNER_TEMP/a263135-order.txt"
          import re
          from pathlib import Path

          files = sorted(Path('Scratch').glob('A263135*.lean'))
          files = [p for p in files if p.name != 'A263135Audit.lean']
          by_module = {'.'.join(p.with_suffix('').parts): p for p in files}
          import_re = re.compile(r'^\s*(?:public\s+|public\s+meta\s+)?import\s+([A-Za-z0-9_.]+)', re.MULTILINE)
          deps = {}
          for name, path in by_module.items():
              imports = import_re.findall(path.read_text(encoding='utf-8'))
              deps[name] = {d for d in imports if d in by_module}
          ordered, temporary, permanent = [], set(), set()
          def visit(name):
              if name in permanent:
                  return
              if name in temporary:
                  raise RuntimeError(f'cyclic import at {name}')
              temporary.add(name)
              for dep in sorted(deps[name]):
                  visit(dep)
              temporary.remove(name)
              permanent.add(name)
              ordered.append(name)
          for name in sorted(by_module):
              visit(name)
          print('\n'.join(ordered))
          PY

          : > "$RUNNER_TEMP/a263135-native.log"
          echo '=== BUILD FormalConjecturesUtil ===' | tee -a "$RUNNER_TEMP/a263135-native.log"
          "$HOME/.elan/bin/lake" build FormalConjecturesUtil 2>&1 | tee -a "$RUNNER_TEMP/a263135-native.log"

          mkdir -p .lake/build/lib/lean/FormalConjectures/OEIS .lake/build/lib/lean/Scratch
          echo '=== COMPILE FormalConjectures.OEIS.263135 ===' | tee -a "$RUNNER_TEMP/a263135-native.log"
          "$HOME/.elan/bin/lake" env lean FormalConjectures/OEIS/263135.lean \
            -o .lake/build/lib/lean/FormalConjectures/OEIS/263135.olean \
            2>&1 | tee -a "$RUNNER_TEMP/a263135-native.log"

          while IFS= read -r module; do
            source_path="${module//.//}.lean"
            output_path=".lake/build/lib/lean/${module//.//}.olean"
            mkdir -p "$(dirname "$output_path")"
            echo "=== COMPILE $module ===" | tee -a "$RUNNER_TEMP/a263135-native.log"
            "$HOME/.elan/bin/lake" env lean "$source_path" -o "$output_path" \
              2>&1 | tee -a "$RUNNER_TEMP/a263135-native.log"
          done < "$RUNNER_TEMP/a263135-order.txt"

          echo '=== COMPILE Scratch.A263135Audit ===' | tee -a "$RUNNER_TEMP/a263135-native.log"
          "$HOME/.elan/bin/lake" env lean Scratch/A263135Audit.lean \
            -o .lake/build/lib/lean/Scratch/A263135Audit.olean \
            2>&1 | tee -a "$RUNNER_TEMP/a263135-native.log"

      - name: Run final theorem axiom audit
        run: |
          set -o pipefail
          "$HOME/.elan/bin/lake" env lean Scratch/A263135Audit.lean 2>&1 | tee -a "$RUNNER_TEMP/a263135-native.log"

      - name: Enforce final axiom policy
        run: |
          set -euo pipefail
          if grep -E 'sorryAx|Lean\.(trustCompiler|ofReduce|ofReduceBool)' "$RUNNER_TEMP/a263135-native.log"; then
            echo 'Forbidden axiom or compiler-trust dependency detected.' >&2
            exit 1
          fi

      - name: Upload native Lean transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a263135-native-final-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/resolved-sha.txt
            ${{ runner.temp }}/a263135-order.txt
            ${{ runner.temp }}/a263135-native.log
          if-no-files-found: warn
