name: OEIS A226247 final Lean audit

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/oeis-a226247-final.yml'
      - 'audits/oeis-a226247-final.trigger'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: oeis-a226247-final-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: warning-free proof and axiom audit
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout immutable proof commit
        uses: actions/checkout@v4
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: f14200cfbd7a5b23839ce72e69eb99d2df603b20
          fetch-depth: 1

      - name: Confirm immutable source and toolchain
        shell: bash
        run: |
          set -euo pipefail
          git rev-parse HEAD | tee "$RUNNER_TEMP/a226247-resolved-sha.txt"
          test "$(git rev-parse HEAD)" = "f14200cfbd7a5b23839ce72e69eb99d2df603b20"
          cat lean-toolchain

      - name: Install repository-pinned Lean
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Fetch Mathlib cache
        run: "$HOME/.elan/bin/lake" exe cache get

      - name: Reject placeholders and trust shortcuts
        shell: bash
        run: |
          set -euo pipefail
          if grep -nE '\b(sorry|admit|native_decide|unsafe)\b|(^|[^A-Za-z])axiom([^A-Za-z]|$)|Lean\.(trustCompiler|ofReduce|ofReduceBool)' \
              FormalConjectures/OEIS/226247.lean; then
            echo 'Forbidden placeholder or trust shortcut found.' >&2
            exit 1
          fi

      - name: Build exact A226247 proof module
        shell: bash
        run: |
          set -o pipefail
          : > "$RUNNER_TEMP/a226247-final.log"
          "$HOME/.elan/bin/lake" build 'FormalConjectures.OEIS.«226247»' \
            2>&1 | tee "$RUNNER_TEMP/a226247-final.log"

      - name: Run terminal axiom audit
        shell: bash
        run: |
          set -o pipefail
          cat > "$RUNNER_TEMP/A226247AxiomAudit.lean" <<'EOF'
          import FormalConjectures.OEIS.«226247»
          #print axioms OeisA226247.blue_iff_negative
          #print axioms OeisA226247.depth_is_shortest
          #print axioms OeisA226247.rank_recurrence
          EOF
          "$HOME/.elan/bin/lake" env lean "$RUNNER_TEMP/A226247AxiomAudit.lean" \
            2>&1 | tee -a "$RUNNER_TEMP/a226247-final.log"

      - name: Enforce final axiom policy
        shell: bash
        run: |
          set -euo pipefail
          if grep -E 'sorryAx|Lean\.(trustCompiler|ofReduce|ofReduceBool)' "$RUNNER_TEMP/a226247-final.log"; then
            echo 'Forbidden axiom or compiler-trust dependency detected.' >&2
            exit 1
          fi

      - name: Upload final transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oeis-a226247-final-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/a226247-resolved-sha.txt
            ${{ runner.temp }}/a226247-final.log
            ${{ runner.temp }}/A226247AxiomAudit.lean
          if-no-files-found: warn
