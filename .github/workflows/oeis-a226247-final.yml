name: OEIS A226247 final Lean audit

on:
  push:
    branches: [main]
    paths:
      - 'audits/oeis-a226247-final.trigger'
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - 'audits/oeis-a226247-final.trigger'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: oeis-a226247-final
  cancel-in-progress: true

jobs:
  verify:
    name: warning-free proof and axiom audit
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout checker repository
        uses: actions/checkout@v4
        with:
          ref: main
          path: checker

      - name: Checkout immutable proof commit
        uses: actions/checkout@v4
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: f14200cfbd7a5b23839ce72e69eb99d2df603b20
          fetch-depth: 1
          path: proof

      - name: Confirm immutable source
        shell: bash
        run: |
          set -euo pipefail
          cd proof
          test "$(git rev-parse HEAD)" = "f14200cfbd7a5b23839ce72e69eb99d2df603b20"
          mkdir -p ../checker/audit-results
          git rev-parse HEAD > ../checker/audit-results/oeis-a226247-resolved-sha.txt

      - name: Install repository-pinned Lean
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Fetch Mathlib cache
        working-directory: proof
        run: "$HOME/.elan/bin/lake" exe cache get

      - name: Reject placeholders and trust shortcuts
        working-directory: proof
        shell: bash
        run: |
          set -euo pipefail
          if grep -nE '\b(sorry|admit|native_decide|unsafe)\b|(^|[^A-Za-z])axiom([^A-Za-z]|$)|Lean\.(trustCompiler|ofReduce|ofReduceBool)' \
              FormalConjectures/OEIS/226247.lean; then
            echo 'Forbidden placeholder or trust shortcut found.' >&2
            exit 1
          fi

      - name: Build exact proof and audit axioms
        id: compile
        continue-on-error: true
        working-directory: proof
        shell: bash
        run: |
          set -o pipefail
          : > ../checker/audit-results/oeis-a226247-final.log
          "$HOME/.elan/bin/lake" build 'FormalConjectures.OEIS.«226247»' \
            2>&1 | tee ../checker/audit-results/oeis-a226247-final.log
          cat > "$RUNNER_TEMP/A226247AxiomAudit.lean" <<'EOF'
          import FormalConjectures.OEIS.«226247»
          #print axioms OeisA226247.blue_iff_negative
          #print axioms OeisA226247.depth_is_shortest
          #print axioms OeisA226247.rank_recurrence
          EOF
          "$HOME/.elan/bin/lake" env lean "$RUNNER_TEMP/A226247AxiomAudit.lean" \
            2>&1 | tee -a ../checker/audit-results/oeis-a226247-final.log
          if grep -E 'sorryAx|Lean\.(trustCompiler|ofReduce|ofReduceBool)' \
              ../checker/audit-results/oeis-a226247-final.log; then
            echo 'Forbidden axiom or compiler-trust dependency detected.' >&2
            exit 1
          fi

      - name: Persist audit transcript
        if: always()
        working-directory: checker
        shell: bash
        run: |
          printf 'outcome=%s\n' '${{ steps.compile.outcome }}' > audit-results/oeis-a226247-outcome.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add audit-results/oeis-a226247-*
          git commit -m 'Record final OEIS A226247 audit transcript [skip ci]' || true
          git push origin HEAD:main

      - name: Enforce compiler result
        if: steps.compile.outcome != 'success'
        run: exit 1
