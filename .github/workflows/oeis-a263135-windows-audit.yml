name: OEIS A263135 Windows kernel audit

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: oeis-a263135-windows-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify A263135 on Windows
    runs-on: windows-2025
    timeout-minutes: 90
    steps:
      - name: Checkout exact proof source
        uses: actions/checkout@v6
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: 7b4ef15d1a63473504da104c6759f05bf67fda5d

      - name: Register scratch proof library
        shell: pwsh
        run: |
          Add-Content -Path lakefile.toml -Value "`n[[lean_lib]]`nname = `"Scratch`"`nglobs = [`"Scratch.+`"]"

      - name: Install pinned Lean tooling
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://github.com/leanprover/elan/releases/download/v1.4.2/elan-x86_64-pc-windows-msvc.zip -OutFile elan.zip
          Expand-Archive elan.zip -DestinationPath elan
          .\elan\elan-init.exe -y --default-toolchain none
          "$env:USERPROFILE\.elan\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Restore pinned mathlib cache
        shell: pwsh
        run: |
          lake exe cache unpack
          if ($LASTEXITCODE -ne 0) { Write-Host 'cache unpack was nonfatal' }
          lake exe cache get
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Reject proof placeholders
        shell: pwsh
        run: |
          $hits = Select-String -Path Scratch\A263135*.lean -Pattern '(^|[^A-Za-z])(sorry|admit)([^A-Za-z]|$)'
          if ($hits) {
            $hits | ForEach-Object { Write-Host $_ }
            throw 'A263135 proof modules contain a placeholder.'
          }

      - name: Build complete proof chain
        shell: pwsh
        run: |
          lake build Scratch.A263135Audit
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Kernel axiom audit
        shell: pwsh
        run: |
          lake env lean Scratch\A263135Audit.lean 2>&1 | Tee-Object -FilePath A263135-axioms.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (Select-String -Path A263135-axioms.log -Pattern 'sorryAx' -Quiet) {
            throw 'A263135 theorem depends on sorryAx.'
          }
