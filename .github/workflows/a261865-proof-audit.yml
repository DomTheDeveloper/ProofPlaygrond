# Independent verification of the exact A261865 proof commit.
name: A261865 independent proof audit

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/a261865-proof-audit.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: a261865-independent-audit-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  axle-foundations:
    name: AXLE foundation audit
    runs-on: ubuntu-slim
    timeout-minutes: 20
    steps:
      - name: Checkout A261865 proof commit
        uses: actions/checkout@v4
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: 02688846b7a0d44e208cef7581bbdbb3978813c6

      - name: Check foundational Lean files with AXLE
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import pathlib
          import sys
          import urllib.request

          files = [
              'FormalConjecturesForMathlib/Analysis/Equidistribution/UnitAddTorus.lean',
              'FormalConjecturesForMathlib/NumberTheory/SquarefreeRadical.lean',
          ]
          failed = False
          for filename in files:
              payload = json.dumps({
                  'content': pathlib.Path(filename).read_text(),
                  'environment': 'lean-4.27.0',
                  'ignore_imports': False,
                  'mathlib_options': False,
                  'timeout_seconds': 900,
              }).encode()
              request = urllib.request.Request(
                  'https://axle.axiommath.ai/api/v1/check',
                  data=payload,
                  headers={'Content-Type': 'application/json'},
                  method='POST',
              )
              with urllib.request.urlopen(request, timeout=960) as response:
                  result = json.load(response)
              print(f'===== {filename} =====')
              print(json.dumps(result, indent=2))
              errors = result.get('lean_messages', {}).get('errors', [])
              tool_errors = result.get('tool_messages', {}).get('errors', [])
              declarations = result.get('failed_declarations', [])
              failed |= bool(errors or tool_errors or declarations or not result.get('okay', False))
          if failed:
              sys.exit(1)
          PY

  exact-kernel-audit:
    name: Lean 4.27 exact theorem and axiom audit
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout A261865 proof commit
        uses: actions/checkout@v4
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: 02688846b7a0d44e208cef7581bbdbb3978813c6

      - name: Install pinned Lean toolchain
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          "$HOME/.elan/bin/elan" toolchain install leanprover/lean4:v4.27.0

      - name: Fetch Mathlib cache
        shell: bash
        run: |
          set -euo pipefail
          lake exe cache get

      - name: Reject proof placeholders and trust escapes
        shell: bash
        run: |
          set -euo pipefail
          files=(
            FormalConjectures/OEIS/A261865Base.lean
            FormalConjectures/OEIS/261865.lean
            FormalConjectures/OEIS/261865Solution.lean
            FormalConjectures/OEIS/261865FinalAudit.lean
            FormalConjecturesForMathlib/Analysis/Equidistribution/TerminalBox.lean
            FormalConjecturesForMathlib/Analysis/Equidistribution/UnitAddTorus.lean
            FormalConjecturesForMathlib/MeasureTheory/Group/UnitAddCircleArc.lean
            FormalConjecturesForMathlib/MeasureTheory/Probability/Empirical.lean
            FormalConjecturesForMathlib/MeasureTheory/Probability/PiContinuitySet.lean
            FormalConjecturesForMathlib/NumberTheory/SquarefreeRadical.lean
            FormalConjecturesForMathlib/NumberTheory/SquarefreeRadicals.lean
          )
          if grep -nE '\b(sorry|admit)\b|native_decide|unsafe|^axiom\b' "${files[@]}"; then
            echo 'Forbidden proof placeholder or trust escape found.' >&2
            exit 1
          fi

      - name: Compile exact theorem and inspect axioms
        shell: bash
        run: |
          set -euo pipefail
          output=$(lake env lean FormalConjectures/OEIS/261865FinalAudit.lean 2>&1)
          printf '%s\n' "$output"
          if grep -q 'sorryAx' <<<"$output"; then
            echo 'The exact numbered theorem depends on sorryAx.' >&2
            exit 1
          fi
