# Independent verification of the exact A261865 proof commit.
name: A261865 independent proof audit

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/a261865-proof-audit.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: a261865-independent-audit-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  axle-foundations:
    name: AXLE foundation audit
    runs-on: ubuntu-slim
    timeout-minutes: 20
    steps:
      - name: Checkout repaired A261865 proof commit
        uses: actions/checkout@v4
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: 46ea24719cc7b65389fe432a7af484d63cfa541f

      - name: Confirm immutable proof source
        shell: bash
        run: test "$(git rev-parse HEAD)" = "46ea24719cc7b65389fe432a7af484d63cfa541f"

      - name: Check foundational Lean files with AXLE
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import pathlib
          import sys
          import urllib.request

          files = [
              'FormalConjecturesForMathlib/Analysis/Equidistribution/UnitAddTorus.lean',
              'FormalConjecturesForMathlib/NumberTheory/SquarefreeRadical.lean',
          ]
          failed = False
          for filename in files:
              payload = json.dumps({
                  'content': pathlib.Path(filename).read_text(),
                  'environment': 'lean-4.27.0',
                  'ignore_imports': False,
                  'mathlib_options': False,
                  'timeout_seconds': 900,
              }).encode()
              request = urllib.request.Request(
                  'https://axle.axiommath.ai/api/v1/check',
                  data=payload,
                  headers={'Content-Type': 'application/json'},
                  method='POST',
              )
              with urllib.request.urlopen(request, timeout=960) as response:
                  result = json.load(response)
              errors = result.get('lean_messages', {}).get('errors', [])
              tool_errors = result.get('tool_messages', {}).get('errors', [])
              okay = bool(result.get('okay', False))
              print(f'===== {filename} =====')
              print(f'okay={okay}')
              print('lean_errors=' + json.dumps(errors, ensure_ascii=False))
              print('tool_errors=' + json.dumps(tool_errors, ensure_ascii=False))
              failed |= bool(errors or tool_errors or not okay)
          if failed:
              sys.exit(1)
          PY

  exact-kernel-audit:
    name: Lean 4.27 exact theorem and axiom audit
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repaired A261865 proof commit
        uses: actions/checkout@v4
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: 46ea24719cc7b65389fe432a7af484d63cfa541f

      - name: Confirm immutable proof source
        shell: bash
        run: test "$(git rev-parse HEAD)" = "46ea24719cc7b65389fe432a7af484d63cfa541f"

      - name: Install pinned Lean toolchain
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          "$HOME/.elan/bin/elan" toolchain install leanprover/lean4:v4.27.0

      - name: Fetch Mathlib cache
        shell: bash
        run: |
          set -euo pipefail
          lake exe cache get

      - name: Reject proof placeholders and trust escapes
        shell: bash
        run: |
          set -euo pipefail
          files=(
            FormalConjectures/OEIS/A261865Base.lean
            FormalConjectures/OEIS/261865.lean
            FormalConjectures/OEIS/261865Solution.lean
            FormalConjectures/OEIS/261865FinalAudit.lean
            FormalConjecturesForMathlib/Analysis/Equidistribution/TerminalBox.lean
            FormalConjecturesForMathlib/Analysis/Equidistribution/UnitAddTorus.lean
            FormalConjecturesForMathlib/MeasureTheory/Group/UnitAddCircleArc.lean
            FormalConjecturesForMathlib/MeasureTheory/Probability/Empirical.lean
            FormalConjecturesForMathlib/MeasureTheory/Probability/PiContinuitySet.lean
            FormalConjecturesForMathlib/NumberTheory/SquarefreeRadical.lean
            FormalConjecturesForMathlib/NumberTheory/SquarefreeRadicals.lean
          )
          if grep -nE '\b(sorry|admit)\b|native_decide|unsafe|^axiom\b|Lean\.trustCompiler|Lean\.ofReduce|Lean\.ofReduceBool' "${files[@]}"; then
            echo 'Forbidden proof placeholder or trust escape found.' >&2
            exit 1
          fi

      - name: Compile exact theorem and inspect axioms
        shell: bash
        run: |
          set -euo pipefail
          lake env lean FormalConjectures/OEIS/261865FinalAudit.lean \
            2>&1 | tee a261865-kernel-audit.log
          if grep -E 'sorryAx|Lean\.trustCompiler|Lean\.ofReduce|Lean\.ofReduceBool' \
              a261865-kernel-audit.log; then
            echo 'The exact numbered theorem depends on a forbidden axiom or trust shortcut.' >&2
            exit 1
          fi

      - name: Upload exact kernel transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a261865-46ea2471-kernel-transcript
          path: a261865-kernel-audit.log
          if-no-files-found: warn
