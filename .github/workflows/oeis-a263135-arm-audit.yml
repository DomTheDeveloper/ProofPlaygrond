name: OEIS A263135 Apple-silicon kernel audit

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: verify A263135 on Apple silicon
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - name: Checkout exact proof source
        uses: actions/checkout@v6
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: 7b4ef15d1a63473504da104c6759f05bf67fda5d

      - name: Register scratch proof library
        run: |
          cat >> lakefile.toml <<'EOF'

          [[lean_lib]]
          name = "Scratch"
          globs = ["Scratch.+"]
          EOF

      - name: Install pinned Lean tooling
        run: |
          set -o pipefail
          curl -sSfL https://github.com/leanprover/elan/releases/download/v1.4.2/elan-aarch64-apple-darwin.tar.gz | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Restore pinned mathlib cache
        run: |
          lake exe cache unpack || true
          lake exe cache get

      - name: Reject proof placeholders
        run: |
          if grep -nE '(^|[^A-Za-z])(sorry|admit)([^A-Za-z]|$)' Scratch/A263135*.lean; then
            echo 'A263135 proof modules contain a placeholder.' >&2
            exit 1
          fi

      - name: Build complete proof chain
        run: lake build Scratch.A263135Audit

      - name: Kernel axiom audit
        run: |
          set -o pipefail
          lake env lean Scratch/A263135Audit.lean 2>&1 | tee A263135-axioms.log
          if grep -q 'sorryAx' A263135-axioms.log; then
            echo 'A263135 theorem depends on sorryAx.' >&2
            exit 1
          fi
