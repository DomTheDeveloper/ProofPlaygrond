name: RNA final kernel gate

on:
  pull_request:
    paths:
      - 'audits/rna-final.trigger'

permissions:
  contents: read

concurrency:
  group: rna-final-kernel-gate
  cancel-in-progress: true

jobs:
  kernel-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Check out exact proof commit
        uses: actions/checkout@v4
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: 7f67058292d4c617f6ac0e04ffb9ca18248953dc
          path: formal-conjectures

      - name: Confirm immutable inputs
        shell: bash
        run: |
          set -euo pipefail
          cd formal-conjectures
          test "$(git rev-parse HEAD)" = "7f67058292d4c617f6ac0e04ffb9ca18248953dc"
          test "$(cat lean-toolchain)" = "leanprover/lean4:v4.27.0"
          test -f lake-manifest.json

      - name: Install exact Lean 4.27.0
        shell: bash
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain leanprover/lean4:v4.27.0
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          "$HOME/.elan/bin/lean" --version
          "$HOME/.elan/bin/lake" --version

      - name: Restore committed dependency cache
        working-directory: formal-conjectures
        shell: bash
        run: |
          set -euo pipefail
          lake exe cache get

      - name: Compile internal and public theorem modules
        working-directory: formal-conjectures
        shell: bash
        run: |
          set -euo pipefail
          lake --wfail build \
            RNAQuasiPowers \
            FormalConjectures.Util.ProblemImports \
            2>&1 | tee rna-final-kernel.log
          out_dir='.lake/build/lib/lean/FormalConjectures/Arxiv/2602.19255'
          mkdir -p "$out_dir"
          lake env lean -DwarningAsError=true \
            -o "$out_dir/RNAQuasiPowers.olean" \
            -i "$out_dir/RNAQuasiPowers.ilean" \
            FormalConjectures/Arxiv/2602.19255/RNAQuasiPowers.lean \
            2>&1 | tee -a rna-final-kernel.log

      - name: Run axiom audits
        working-directory: formal-conjectures
        shell: bash
        run: |
          set -euo pipefail
          lake env lean -DwarningAsError=true RNAQuasiPowers/AxiomAudit.lean \
            2>&1 | tee -a rna-final-kernel.log
          lake env lean -DwarningAsError=true \
            FormalConjectures/Arxiv/2602.19255/RNAQuasiPowersAxiomAudit.lean \
            2>&1 | tee -a rna-final-kernel.log
          if grep -E 'sorryAx|Lean\.trustCompiler|Lean\.ofReduce|Lean\.ofReduceBool' \
              rna-final-kernel.log; then
            echo 'Forbidden axiom or compiler-trust shortcut detected.' >&2
            exit 1
          fi

      - name: Upload exact transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rna-final-lean427-kernel-transcript
          path: formal-conjectures/rna-final-kernel.log
          if-no-files-found: warn
