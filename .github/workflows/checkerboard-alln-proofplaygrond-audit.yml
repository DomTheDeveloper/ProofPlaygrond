# Focused pure-kernel bridge audit for source commit 0b6ac8fe2444f8b42a871cb397d276b36829a5e9.

name: Checkerboard all-n ProofPlaygrond audit

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/checkerboard-alln-proofplaygrond-audit.yml'
      - 'audits/checkerboard-alln-proofplaygrond.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout exact omega bridge source
        uses: actions/checkout@v6
        with:
          repository: DomTheDeveloper/ProofPlaygrond
          ref: 0b6ac8fe2444f8b42a871cb397d276b36829a5e9
          fetch-depth: 1

      - name: Record exact commit
        run: git rev-parse HEAD | tee "$RUNNER_TEMP/resolved-sha.txt"

      - name: Install repository-pinned Lean
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Resolve pinned Mathlib and cache
        run: |
          set -euo pipefail
          "$HOME/.elan/bin/lake" update
          "$HOME/.elan/bin/lake" exe cache get

      - name: Reject proof holes and trust shortcuts
        run: |
          set -euo pipefail
          files=(Checkerboard/N6SATTest.lean Checkerboard/N6BridgeTest.lean)
          if grep -nE '\b(sorry|admit|native_decide|unsafe)\b|(^|[^A-Za-z])axiom([^A-Za-z]|$)|bv_decide|bv_check|Lean\.(trustCompiler|ofReduce|ofReduceBool)' "${files[@]}"; then
            echo 'Forbidden placeholder or trust shortcut found in checkerboard bridge.' >&2
            exit 1
          fi

      - name: Compile omega certificate bridge
        run: |
          set -o pipefail
          "$HOME/.elan/bin/lake" env lean Checkerboard/N6BridgeTest.lean \
            2>&1 | tee "$RUNNER_TEMP/checkerboard-n6-bridge.log"

      - name: Enforce axiom policy
        run: |
          set -euo pipefail
          if grep -E 'sorryAx|_native\.bv_decide|Lean\.(trustCompiler|ofReduce|ofReduceBool)' "$RUNNER_TEMP/checkerboard-n6-bridge.log"; then
            echo 'Forbidden axiom or compiler-trust dependency detected.' >&2
            exit 1
          fi

      - name: Upload bridge transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkerboard-n6-bridge-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/resolved-sha.txt
            ${{ runner.temp }}/checkerboard-n6-bridge.log
          if-no-files-found: warn
