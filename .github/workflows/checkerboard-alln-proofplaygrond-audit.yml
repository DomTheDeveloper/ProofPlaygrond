name: Checkerboard all-n ProofPlaygrond audit

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/checkerboard-alln-proofplaygrond-audit.yml'
      - 'audits/checkerboard-alln-proofplaygrond.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  certify-n6:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout checkerboard proof branch
        uses: actions/checkout@v6
        with:
          ref: migrate/checkerboard-alln-27a80067
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install repository-pinned Lean
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Resolve pinned Mathlib and cache
        run: |
          set -euo pipefail
          "$HOME/.elan/bin/lake" update
          "$HOME/.elan/bin/lake" exe cache get

      - name: Restore pure BitVec SAT source
        run: |
          cat > Checkerboard/N6SATTest.lean <<'EOF'
          import Mathlib

          namespace Checkerboard

          private def pop18 (x : BitVec 18) : BitVec 18 :=
            go x 0 18
          where
            go (x pop : BitVec 18) : Nat → BitVec 18
              | 0 => pop
              | n + 1 => go (x >>> 1) (pop + (x &&& 1)) n

          private theorem p0_sat (x : BitVec 18)
              (h0 : pop18 (x &&& 0x7#18) ≤ 2#18)
              (h1 : pop18 (x &&& 0x38#18) ≤ 2#18)
              (h2 : pop18 (x &&& 0x1c0#18) ≤ 2#18)
              (h3 : pop18 (x &&& 0xe00#18) ≤ 2#18)
              (h4 : pop18 (x &&& 0x7000#18) ≤ 2#18)
              (h5 : pop18 (x &&& 0x38000#18) ≤ 2#18)
              (h6 : pop18 (x &&& 0x1041#18) ≤ 2#18)
              (h7 : pop18 (x &&& 0x2082#18) ≤ 2#18)
              (h8 : pop18 (x &&& 0x4104#18) ≤ 2#18)
              (h9 : pop18 (x &&& 0x8208#18) ≤ 2#18)
              (h10 : pop18 (x &&& 0x10410#18) ≤ 2#18)
              (h11 : pop18 (x &&& 0x20820#18) ≤ 2#18)
              (h12 : pop18 (x &&& 0x4a#18) ≤ 2#18)
              (h13 : pop18 (x &&& 0x1294#18) ≤ 2#18)
              (h14 : pop18 (x &&& 0xa520#18) ≤ 2#18)
              (h15 : pop18 (x &&& 0x14800#18) ≤ 2#18)
              (h16 : pop18 (x &&& 0x24489#18) ≤ 2#18)
              (h17 : pop18 (x &&& 0x912#18) ≤ 2#18)
              (h18 : pop18 (x &&& 0x12240#18) ≤ 2#18) :
              pop18 x ≤ 8#18 := by
            dsimp [pop18, pop18.go] at *
            bv_decide?

          private theorem p1_sat (x : BitVec 18)
              (h0 : pop18 (x &&& 0x7#18) ≤ 2#18)
              (h1 : pop18 (x &&& 0x38#18) ≤ 2#18)
              (h2 : pop18 (x &&& 0x1c0#18) ≤ 2#18)
              (h3 : pop18 (x &&& 0xe00#18) ≤ 2#18)
              (h4 : pop18 (x &&& 0x7000#18) ≤ 2#18)
              (h5 : pop18 (x &&& 0x38000#18) ≤ 2#18)
              (h6 : pop18 (x &&& 0x1041#18) ≤ 2#18)
              (h7 : pop18 (x &&& 0x2082#18) ≤ 2#18)
              (h8 : pop18 (x &&& 0x4104#18) ≤ 2#18)
              (h9 : pop18 (x &&& 0x8208#18) ≤ 2#18)
              (h10 : pop18 (x &&& 0x10410#18) ≤ 2#18)
              (h11 : pop18 (x &&& 0x20820#18) ≤ 2#18)
              (h12 : pop18 (x &&& 0x252#18) ≤ 2#18)
              (h13 : pop18 (x &&& 0x94a4#18) ≤ 2#18)
              (h14 : pop18 (x &&& 0x12900#18) ≤ 2#18)
              (h15 : pop18 (x &&& 0x4891#18) ≤ 2#18)
              (h16 : pop18 (x &&& 0x122#18) ≤ 2#18)
              (h17 : pop18 (x &&& 0x22448#18) ≤ 2#18)
              (h18 : pop18 (x &&& 0x11200#18) ≤ 2#18) :
              pop18 x ≤ 8#18 := by
            dsimp [pop18, pop18.go] at *
            bv_decide?

          end Checkerboard
          EOF

      - name: Generate, rename, and verify LRAT certificates
        run: |
          set -euo pipefail
          "$HOME/.elan/bin/lake" env lean Checkerboard/N6SATTest.lean
          p0=$(find Checkerboard -maxdepth 1 -name '*p0_sat*.lrat' -print -quit)
          p1=$(find Checkerboard -maxdepth 1 -name '*p1_sat*.lrat' -print -quit)
          test -n "$p0" && test -n "$p1"
          mv "$p0" Checkerboard/N6P0.lrat
          mv "$p1" Checkerboard/N6P1.lrat
          python3 - <<'PY'
          from pathlib import Path
          p = Path('Checkerboard/N6SATTest.lean')
          text = p.read_text()
          text = text.replace('bv_decide?', 'bv_check "N6P0.lrat"', 1)
          text = text.replace('bv_decide?', 'bv_check "N6P1.lrat"', 1)
          text = text.replace('\nend Checkerboard\n', '\n#print axioms p0_sat\n#print axioms p1_sat\n\nend Checkerboard\n')
          p.write_text(text)
          PY
          "$HOME/.elan/bin/lake" env lean Checkerboard/N6SATTest.lean \
            2>&1 | tee "$RUNNER_TEMP/checkerboard-n6-bvcheck.log"
          if grep -E 'sorryAx|_native\.bv_decide|Lean\.(trustCompiler|ofReduce|ofReduceBool)' \
              "$RUNNER_TEMP/checkerboard-n6-bvcheck.log"; then
            echo 'Forbidden trust dependency detected.' >&2
            exit 1
          fi

      - name: Commit certificate and checked source
        run: |
          set -euo pipefail
          git config user.name 'ProofOrchestrator'
          git config user.email 'proof-orchestrator@users.noreply.github.com'
          git add Checkerboard/N6SATTest.lean Checkerboard/N6P0.lrat Checkerboard/N6P1.lrat
          git diff --cached --check
          git commit -m 'Add kernel-checked n6 checkerboard LRAT certificates'
          git push origin HEAD:migrate/checkerboard-alln-27a80067

      - name: Upload verification transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkerboard-n6-bvcheck-${{ github.run_id }}
          path: ${{ runner.temp }}/checkerboard-n6-bvcheck.log
          if-no-files-found: warn
