# Focused audit for kernel-only n6 source commit ddac364bedbd748af9a4b3c3f8643ee3f65e5f7d.

name: Checkerboard all-n ProofPlaygrond audit

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/checkerboard-alln-proofplaygrond-audit.yml'
      - 'audits/checkerboard-alln-proofplaygrond.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout exact omega-certificate source
        uses: actions/checkout@v6
        with:
          repository: DomTheDeveloper/ProofPlaygrond
          ref: ddac364bedbd748af9a4b3c3f8643ee3f65e5f7d
          fetch-depth: 1

      - name: Record exact commit
        run: git rev-parse HEAD | tee "$RUNNER_TEMP/resolved-sha.txt"

      - name: Install repository-pinned Lean
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Restore checkerboard Lean cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .lake/packages
            .lake/build
          key: checkerboard-432-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lakefile.lean') }}
          restore-keys: checkerboard-432-${{ runner.os }}-

      - name: Resolve pinned Mathlib
        run: |
          set -euo pipefail
          "$HOME/.elan/bin/lake" update

      - name: Fetch Mathlib olean cache
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if "$HOME/.elan/bin/lake" exe cache get; then
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Compile kernel-only n6 certificate
        run: |
          set -o pipefail
          "$HOME/.elan/bin/lake" env lean Checkerboard/N6SATTest.lean \
            2>&1 | tee "$RUNNER_TEMP/checkerboard-alln.log"

      - name: Enforce axiom policy
        run: |
          set -euo pipefail
          if grep -E 'sorryAx|_native\.bv_decide|Lean\.(trustCompiler|ofReduce|ofReduceBool)' "$RUNNER_TEMP/checkerboard-alln.log"; then
            echo 'Forbidden axiom or compiler-trust dependency detected.' >&2
            exit 1
          fi

      - name: Upload focused transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkerboard-n6-omega-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/resolved-sha.txt
            ${{ runner.temp }}/checkerboard-alln.log
          if-no-files-found: warn
