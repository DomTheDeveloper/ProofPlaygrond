name: Chomp kernel feasibility

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/chomp-kernel-feasibility.yml'
  pull_request:
    branches: [main]
    paths:
      - 'proofs/chomp-10x42/**'
      - '.github/workflows/chomp-kernel-feasibility.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout immutable proof-development commit
        uses: actions/checkout@v4
        with:
          ref: 3ecb3ec28b52fc898fdc90b1235b2ecf3e268b90
      - name: Run certificate feasibility audit
        working-directory: proofs/chomp-10x42
        shell: bash
        run: bash run_kernel_feasibility.sh
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chomp-kernel-feasibility
          path: proofs/chomp-10x42/certificate-feasibility.md
          if-no-files-found: warn
