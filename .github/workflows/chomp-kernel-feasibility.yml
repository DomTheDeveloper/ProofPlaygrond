name: Chomp kernel feasibility

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout proof development
        uses: actions/checkout@v4
      - name: Run certificate feasibility audit
        working-directory: proofs/chomp-10x42
        shell: bash
        run: bash run_kernel_feasibility.sh
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chomp-kernel-feasibility
          path: proofs/chomp-10x42/certificate-feasibility.md
          if-no-files-found: warn
