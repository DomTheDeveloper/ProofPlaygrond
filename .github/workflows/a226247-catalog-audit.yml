name: A226247 clean catalog audit

on:
  push:
    branches: [agent/a226247-catalog-audit]
    paths:
      - '.github/workflows/a226247-catalog-audit.yml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/a226247-catalog-audit.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: a226247-catalog-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  catalog:
    name: Lean 4.27 exact A226247 module
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout immutable DTD proof commit
        uses: actions/checkout@v4
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: 72d2906000d77bb4d2d1c5bd5f93211f3876ee44

      - name: Confirm immutable source and toolchain
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "72d2906000d77bb4d2d1c5bd5f93211f3876ee44"
          test "$(cat lean-toolchain)" = "leanprover/lean4:v4.27.0"
          test -z "$(grep -nE '\b(sorry|admit)\b' FormalConjectures/OEIS/226247.lean || true)"

      - name: Install Lean 4.27
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          "$HOME/.elan/bin/elan" toolchain install leanprover/lean4:v4.27.0

      - name: Fetch Mathlib cache
        run: lake exe cache get

      - name: Build exact catalog module
        shell: bash
        run: |
          set -o pipefail
          lake build 'FormalConjectures.OEIS.«226247»' \
            2>&1 | tee a226247-catalog-audit.log

      - name: Upload catalog transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a226247-72d29060-catalog-transcript
          path: a226247-catalog-audit.log
          if-no-files-found: warn
