name: Geode5 final external audit

on:
  pull_request:
    branches: [main]
    paths:
      - 'audits/geode5-final-external.trigger'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: geode5-final-external-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  exact:
    runs-on: ubuntu-slim
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: 89a8f3c8de74039ab989100c27a6bf24234556f8
          path: target
      - name: Set up Lean and Mathlib cache
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: target
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: true
      - name: Reject actual placeholders
        working-directory: target
        shell: bash
        run: |
          set -euo pipefail
          ! grep -RInE 'by[[:space:]]+(sorry|admit)\b|^[[:space:]]*(sorry|admit)\b' \
            FormalConjectures/Arxiv/2508.10245/Geode5Proof \
            FormalConjectures/Arxiv/2508.10245/Geode5.lean
      - name: Compile exact final theorem
        id: compile
        continue-on-error: true
        working-directory: target
        shell: bash
        run: |
          set -o pipefail
          lake env lean -DwarningAsError=true \
            FormalConjectures/Arxiv/2508.10245/Geode5.lean \
            2>&1 | tee "$RUNNER_TEMP/geode5-final.log"
      - name: Report
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          OUTCOME: ${{ steps.compile.outcome }}
        shell: bash
        run: |
          {
            echo '## Geode5 immutable final audit'
            echo
            echo 'Target: `DomTheDeveloper/formal-conjectures@89a8f3c8de74039ab989100c27a6bf24234556f8`'
            echo 'Module: `FormalConjectures/Arxiv/2508.10245/Geode5.lean`'
            echo "Result: **${OUTCOME}**"
            echo
            echo '```text'
            tail -n 240 "$RUNNER_TEMP/geode5-final.log" 2>/dev/null || true
            echo '```'
          } > "$RUNNER_TEMP/geode5-comment.md"
          gh pr comment '${{ github.event.pull_request.number }}' --repo '${{ github.repository }}' --body-file "$RUNNER_TEMP/geode5-comment.md"
      - name: Enforce
        if: steps.compile.outcome != 'success'
        run: exit 1
