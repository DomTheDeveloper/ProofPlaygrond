name: RNA quasi-powers exact Lean audit

on:
  push:
    branches:
      - 'verify/rna-quasipowers-ef541834'
    paths:
      - '.github/workflows/rna-quasipowers-ef541834-audit.yml'
      - 'audits/rna-quasipowers-ef541834.trigger'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rna-quasipowers-ef541834-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Check out reporting branch
        uses: actions/checkout@v4
        with:
          path: playground
          ref: verify/rna-quasipowers-ef541834

      - name: Check out exact Formal Conjectures proof commit
        uses: actions/checkout@v4
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: ef541834089a3c8941f7bc311601d1b8a8dfc117
          path: formal-conjectures

      - name: Run exact Lean 4.27 kernel audit
        id: audit
        shell: bash
        run: |
          set +e
          LOG="$GITHUB_WORKSPACE/rna-kernel-audit.log"
          : > "$LOG"
          {
            echo "proof_sha=ef541834089a3c8941f7bc311601d1b8a8dfc117"
            cd "$GITHUB_WORKSPACE/formal-conjectures"
            test "$(git rev-parse HEAD)" = "ef541834089a3c8941f7bc311601d1b8a8dfc117"
            test "$(cat lean-toolchain)" = "leanprover/lean4:v4.27.0"
            test -f lake-manifest.json

            curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
              | sh -s -- -y --default-toolchain leanprover/lean4:v4.27.0
            export PATH="$HOME/.elan/bin:$PATH"
            lean --version
            lake --version

            TOOLCHAIN="$HOME/.elan/toolchains/leanprover--lean4---v4.27.0"
            test -d "$TOOLCHAIN"
            tar --zstd -cf "$GITHUB_WORKSPACE/lean427-toolchain-only.tar.zst" \
              -C "$HOME/.elan/toolchains" leanprover--lean4---v4.27.0

            lake exe cache get
            lake --wfail build RNAQuasiPowers
            lake env lean FormalConjectures/Arxiv/2602.19255/RNAQuasiPowers.lean
            lake env lean RNAQuasiPowers/AxiomAudit.lean
            lake env lean FormalConjectures/Arxiv/2602.19255/RNAQuasiPowersAxiomAudit.lean

            if grep -E 'sorryAx|Lean\.trustCompiler|Lean\.ofReduce|Lean\.ofReduceBool' "$LOG"; then
              echo 'Forbidden axiom or compiler-trust shortcut detected.'
              exit 90
            fi
          } 2>&1 | tee -a "$LOG"
          rc=${PIPESTATUS[0]}
          echo "$rc" > "$GITHUB_WORKSPACE/rna-kernel-audit.rc"
          exit 0

      - name: Upload portable Lean and transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rna-quasipowers-ef541834-portable-audit
          path: |
            lean427-toolchain-only.tar.zst
            rna-kernel-audit.log
            rna-kernel-audit.rc
          compression-level: 0
          if-no-files-found: warn

      - name: Commit audit transcript to verification branch
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rc=125
          if [ -f "$GITHUB_WORKSPACE/rna-kernel-audit.rc" ]; then
            rc=$(cat "$GITHUB_WORKSPACE/rna-kernel-audit.rc")
          fi
          mkdir -p playground/audits
          {
            echo "proof_sha=ef541834089a3c8941f7bc311601d1b8a8dfc117"
            echo "workflow_sha=${GITHUB_SHA}"
            echo "exit_code=${rc}"
            echo "run_url=https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo "===== Lean transcript ====="
            if [ -f "$GITHUB_WORKSPACE/rna-kernel-audit.log" ]; then
              cat "$GITHUB_WORKSPACE/rna-kernel-audit.log"
            else
              echo "No transcript was produced."
            fi
          } > playground/audits/rna-quasipowers-ef541834-result.txt
          cd playground
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add audits/rna-quasipowers-ef541834-result.txt
          if ! git diff --cached --quiet; then
            git commit -m "audit: record RNA quasi-powers Lean result"
            git push origin HEAD:verify/rna-quasipowers-ef541834
          fi

      - name: Enforce audit result
        if: always()
        shell: bash
        run: |
          test -f "$GITHUB_WORKSPACE/rna-kernel-audit.rc"
          test "$(cat "$GITHUB_WORKSPACE/rna-kernel-audit.rc")" = "0"
