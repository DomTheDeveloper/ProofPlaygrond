name: A261865 corrected kernel audit

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/a261865-kernel-v2.yml'
  pull_request:
    branches: [main]
    paths:
      - 'audits/a261865-kernel-v2.trigger'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: a261865-kernel-v2-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  exact-kernel-audit:
    name: Lean 4.27 exact theorem and axiom audit v2
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout immutable repaired proof
        uses: actions/checkout@v4
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: a6b4035b0c4bc05f6475839615bacddc22024415

      - name: Confirm immutable proof source and toolchain
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "a6b4035b0c4bc05f6475839615bacddc22024415"
          test "$(cat lean-toolchain)" = "leanprover/lean4:v4.27.0"

      - name: Install pinned Lean toolchain
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          "$HOME/.elan/bin/elan" toolchain install leanprover/lean4:v4.27.0

      - name: Fetch Mathlib cache
        shell: bash
        run: |
          set -euo pipefail
          lake exe cache get

      - name: Reject placeholders and trust escapes
        shell: bash
        run: |
          set -euo pipefail
          files=(
            FormalConjectures/OEIS/A261865Base.lean
            FormalConjectures/OEIS/261865.lean
            FormalConjectures/OEIS/261865Solution.lean
            FormalConjectures/OEIS/261865FinalAudit.lean
            FormalConjecturesForMathlib/Analysis/Equidistribution/TerminalBox.lean
            FormalConjecturesForMathlib/Analysis/Equidistribution/UnitAddTorus.lean
            FormalConjecturesForMathlib/MeasureTheory/Group/UnitAddCircleArc.lean
            FormalConjecturesForMathlib/MeasureTheory/Probability/Empirical.lean
            FormalConjecturesForMathlib/MeasureTheory/Probability/PiContinuitySet.lean
            FormalConjecturesForMathlib/NumberTheory/SquarefreeRadical.lean
            FormalConjecturesForMathlib/NumberTheory/SquarefreeRadicals.lean
          )
          if grep -nE '\b(sorry|admit)\b|native_decide|unsafe|^axiom\b|Lean\.trustCompiler|Lean\.ofReduce|Lean\.ofReduceBool' "${files[@]}"; then
            echo 'Forbidden proof placeholder or trust escape found.' >&2
            exit 1
          fi

      - name: Build exact numbered theorem dependencies
        shell: bash
        run: |
          set -euo pipefail
          lake build 'FormalConjectures.OEIS.«261865»' \
            2>&1 | tee a261865-kernel-audit.log

      - name: Compile audit wrapper and inspect axioms
        shell: bash
        run: |
          set -euo pipefail
          lake env lean FormalConjectures/OEIS/261865FinalAudit.lean \
            2>&1 | tee -a a261865-kernel-audit.log
          if grep -E 'sorryAx|Lean\.trustCompiler|Lean\.ofReduce|Lean\.ofReduceBool' \
              a261865-kernel-audit.log; then
            echo 'The exact numbered theorem depends on a forbidden axiom or trust shortcut.' >&2
            exit 1
          fi

      - name: Upload exact kernel transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a261865-a6b4035b-kernel-v2-transcript
          path: a261865-kernel-audit.log
          if-no-files-found: warn
