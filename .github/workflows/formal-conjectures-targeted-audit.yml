name: Targeted Formal Conjectures Lean audit

on:
  push:
    branches: [main]
    paths:
      - 'audits/formal-conjectures-target.env'
  pull_request:
    branches: [main]
    paths:
      - 'audits/formal-conjectures-target.env'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  statuses: write

concurrency:
  group: targeted-formal-conjectures-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Build exact requested module
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout audit controller
        uses: actions/checkout@v4
        with:
          path: controller

      - name: Read immutable target
        id: target
        shell: bash
        run: |
          set -euo pipefail
          source controller/audits/formal-conjectures-target.env
          test -n "${REPOSITORY:-}"
          test -n "${COMMIT_SHA:-}"
          test -n "${MODULE:-}"
          test -n "${SOURCE_FILE:-}"
          echo "repository=$REPOSITORY" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"
          echo "module=$MODULE" >> "$GITHUB_OUTPUT"
          echo "source_file=$SOURCE_FILE" >> "$GITHUB_OUTPUT"

      - name: Checkout immutable proof commit
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.target.outputs.repository }}
          ref: ${{ steps.target.outputs.commit_sha }}
          path: target

      - name: Confirm source, commit, and toolchain
        shell: bash
        working-directory: target
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ steps.target.outputs.commit_sha }}"
          test "$(cat lean-toolchain)" = "leanprover/lean4:v4.27.0"
          test -f "${{ steps.target.outputs.source_file }}"
          test -z "$(grep -nE '\b(sorry|admit)\b' "${{ steps.target.outputs.source_file }}" || true)"

      - name: Install Lean 4.27
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          "$HOME/.elan/bin/elan" toolchain install leanprover/lean4:v4.27.0

      - name: Fetch Mathlib cache
        working-directory: target
        run: lake exe cache get

      - name: Build exact module
        shell: bash
        working-directory: target
        run: |
          set -o pipefail
          lake --wfail build '${{ steps.target.outputs.module }}' \
            2>&1 | tee targeted-formal-conjectures-audit.log

      - name: Upload compiler transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: targeted-formal-conjectures-transcript
          path: target/targeted-formal-conjectures-audit.log
          if-no-files-found: warn

      - name: Publish diagnostic excerpt
        if: always()
        uses: actions/github-script@v7
        env:
          JOB_STATUS: ${{ job.status }}
          TARGET_REPOSITORY: ${{ steps.target.outputs.repository }}
          TARGET_COMMIT: ${{ steps.target.outputs.commit_sha }}
          TARGET_MODULE: ${{ steps.target.outputs.module }}
          TARGET_SOURCE: ${{ steps.target.outputs.source_file }}
        with:
          script: |
            const fs = require('fs');
            const path = 'target/targeted-formal-conjectures-audit.log';
            let log = '';
            try { log = fs.readFileSync(path, 'utf8'); } catch (_) {}
            const lines = log.split(/\r?\n/);
            const selected = new Set();
            for (let i = 0; i < lines.length; i++) {
              if (/error:|unsolved goals|failed to build|declaration uses 'sorry'|unknown identifier|type mismatch/i.test(lines[i])) {
                for (let j = Math.max(0, i - 5); j <= Math.min(lines.length - 1, i + 8); j++) selected.add(j);
              }
            }
            let excerpt;
            if (selected.size) {
              excerpt = [...selected].sort((a, b) => a - b).map(i => lines[i]).join('\n');
            } else {
              excerpt = lines.slice(-160).join('\n');
            }
            excerpt = excerpt.slice(-50000);
            const body = [
              '# Targeted Formal Conjectures audit',
              '',
              `- **Result:** ${process.env.JOB_STATUS}`,
              `- **Repository:** \`${process.env.TARGET_REPOSITORY}\``,
              `- **Commit:** \`${process.env.TARGET_COMMIT}\``,
              `- **Module:** \`${process.env.TARGET_MODULE}\``,
              `- **Source:** \`${process.env.TARGET_SOURCE}\``,
              `- **Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              '## Compiler excerpt',
              '',
              '```text',
              excerpt || '(no compiler log was produced)',
              '```'
            ].join('\n');
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 74,
              body
            });

  report:
    name: Publish machine-readable result
    if: always()
    needs: audit
    runs-on: ubuntu-latest
    steps:
      - name: Set commit status
        uses: actions/github-script@v7
        env:
          AUDIT_RESULT: ${{ needs.audit.result }}
        with:
          script: |
            const ok = process.env.AUDIT_RESULT === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: ok ? 'success' : 'failure',
              context: 'targeted-formal-conjectures-audit',
              description: ok
                ? 'Exact Lean module compiled with --wfail'
                : `Targeted audit result: ${process.env.AUDIT_RESULT}`,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
