name: WOWII 2 catalog final audit

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/wowii2-catalog-final.yml'
      - 'audits/WOWII2-catalog-final.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: clean catalog module build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout exact GDM-facing patch
        uses: actions/checkout@v6
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: 1a297b6e201c7cbaf462ef9e4d32b67a4f955e25
          fetch-depth: 1

      - name: Record exact commit
        run: git rev-parse HEAD | tee "$RUNNER_TEMP/resolved-sha.txt"

      - name: Install repository-pinned Lean
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Restore Lean build cache
        uses: actions/cache@v4
        with:
          path: |
            .lake/packages
            .lake/build
          key: wowii2-catalog-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml') }}
          restore-keys: wowii2-catalog-${{ runner.os }}-

      - name: Restore pinned Mathlib cache
        run: |
          set -euo pipefail
          "$HOME/.elan/bin/lake" exe cache unpack || true
          "$HOME/.elan/bin/lake" exe cache get

      - name: Verify one-file upstream scope
        run: |
          set -euo pipefail
          test "$(git diff --name-only ca8e34cae845185b1fc18d3148deaee146ee1ee8..HEAD | wc -l)" -eq 1
          test "$(git diff --name-only ca8e34cae845185b1fc18d3148deaee146ee1ee8..HEAD)" = \
            'FormalConjectures/WrittenOnTheWallII/GraphConjecture2.lean'

      - name: Build exact catalog module
        run: |
          set -o pipefail
          "$HOME/.elan/bin/lake" build FormalConjectures.WrittenOnTheWallII.GraphConjecture2 \
            2>&1 | tee "$RUNNER_TEMP/wowii2-catalog.log"

      - name: Check copyright header
        run: |
          set -euo pipefail
          head -n 3 FormalConjectures/WrittenOnTheWallII/GraphConjecture2.lean | \
            grep -q 'Copyright 2025 The Formal Conjectures Authors.'

      - name: Upload transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wowii2-catalog-final-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/resolved-sha.txt
            ${{ runner.temp }}/wowii2-catalog.log
          if-no-files-found: warn
