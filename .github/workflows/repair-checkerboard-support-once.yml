name: Repair checkerboard support once

on:
  push:
    branches: [migrate/checkerboard-alln-27a80067]
    paths: ['.github/workflows/repair-checkerboard-support-once.yml']

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: migrate/checkerboard-alln-27a80067
          fetch-depth: 0
      - name: Apply exact support compatibility repairs
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              p = Path(path)
              text = p.read_text()
              if text.count(old) != 1:
                  raise SystemExit(f'{path}: expected one match, found {text.count(old)}')
              p.write_text(text.replace(old, new, 1))

          replace_once(
              'Checkerboard/Model.lean',
              '''instance {n : ℕ} (line : PrincipalLine n) : DecidablePred (OnLine line) :=
  fun _ => inferInstance''',
              '''instance {n : ℕ} (line : PrincipalLine n) : DecidablePred (OnLine line) := by
  intro p
  unfold OnLine
  infer_instance''')

          replace_once(
              'Checkerboard/Model.lean',
              '''private theorem sum_indicator_eq_card_filter {α : Type*} [DecidableEq α]
    (s : Finset α) (P : α → Prop) [DecidablePred P] (w : ℕ) :
    (∑ a ∈ s, if P a then w else 0) = (s.filter P).card * w := by
  induction s using Finset.induction_on with
  | empty => simp
  | @insert a s ha ih =>
      by_cases hP : P a <;>
        simp [ha, hP, ih, Nat.add_mul]''',
              '''private theorem sum_indicator_eq_card_filter {α : Type*} [DecidableEq α]
    (s : Finset α) (P : α → Prop) [DecidablePred P] (w : ℕ) :
    (∑ a ∈ s, if P a then w else 0) = (s.filter P).card * w := by
  induction s using Finset.induction_on with
  | empty => simp
  | @insert a s ha ih =>
      by_cases hP : P a
      · have hnot : a ∉ s.filter P := by
          intro hmem
          exact ha (Finset.mem_of_mem_filter hmem)
        simp [ha, hP, hnot, ih, Nat.add_mul, Nat.add_comm]
      · simp [ha, hP, ih]''')

          fiber = Path('Checkerboard/FiberSums.lean')
          text = fiber.read_text()
          start = text.index('/-- Every element of a finite set belongs to exactly one fiber. -/')
          end = text.index('/-- Unweighted point count as the sum of all fiber counts, cast to a semiring. -/')
          replacement = '''private theorem fiberCard_mul_eq_sum [CommSemiring R]
    (s : Finset α) (f : α → β) (b : β) (g : β → R) :
    (fiberCard s f b : R) * g b =
      ∑ a ∈ s, if f a = b then g b else 0 := by
  classical
  induction s using Finset.induction_on with
  | empty => simp [fiberCard]
  | @insert a s ha ih =>
      by_cases h : f a = b
      · have hnot : a ∉ s.filter fun x => f x = b := by
          intro hmem
          exact ha (Finset.mem_of_mem_filter hmem)
        simp [fiberCard, ha, h, hnot, ih, add_mul]
      · simp [fiberCard, ha, h, ih]

/-- Weighted double counting over all fibers. -/
theorem sum_fiberCard_mul [Fintype β] [CommSemiring R]
    (s : Finset α) (f : α → β) (g : β → R) :
    ∑ b : β, (fiberCard s f b : R) * g b =
      ∑ a ∈ s, g (f a) := by
  classical
  calc
    ∑ b : β, (fiberCard s f b : R) * g b =
        ∑ b : β, ∑ a ∈ s, if f a = b then g b else 0 := by
          apply Finset.sum_congr rfl
          intro b _
          exact fiberCard_mul_eq_sum s f b g
    _ = ∑ a ∈ s, ∑ b : β, if f a = b then g b else 0 := by
          rw [Finset.sum_comm]
    _ = ∑ a ∈ s, g (f a) := by
          apply Finset.sum_congr rfl
          intro a _
          simp

/-- Every element of a finite set belongs to exactly one fiber. -/
theorem sum_fiberCard [Fintype β] (s : Finset α) (f : α → β) :
    ∑ b : β, fiberCard s f b = s.card := by
  simpa using sum_fiberCard_mul (R := ℕ) s f (fun _ => 1)

'''
          fiber.write_text(text[:start] + replacement + text[end:])

          replace_once(
              'Checkerboard/PolynomialSums.lean',
              '''theorem sum_range_quadratic_cap (N : ℕ) :
    (∑ j ∈ Finset.range (2 * N + 1),
      2 * ((N : ℚ) ^ 2 - ((j : ℚ) - N) ^ 2)) =
      2 * (N : ℚ) * (2 * (N : ℚ) - 1) * (2 * (N : ℚ) + 1) / 3 := by
  have h := sum_range_affine_sq (2 * N + 1) (1 : ℚ) (-(N : ℚ))
  push_cast at h ⊢
  calc
    (∑ j ∈ Finset.range (2 * N + 1),
      2 * ((N : ℚ) ^ 2 - ((j : ℚ) - N) ^ 2)) =
        2 * ((2 * (N : ℚ) + 1) * (N : ℚ) ^ 2 -
          ∑ j ∈ Finset.range (2 * N + 1),
            ((j : ℚ) - N) ^ 2) := by
          simp only [Finset.sum_sub_distrib, Finset.sum_mul,
            Finset.sum_const, Finset.card_range, nsmul_eq_mul]
          ring
    _ = 2 * (N : ℚ) * (2 * (N : ℚ) - 1) *
          (2 * (N : ℚ) + 1) / 3 := by
          rw [h]
          ring''',
              '''theorem sum_range_quadratic_cap (N : ℕ) :
    (∑ j ∈ Finset.range (2 * N + 1),
      2 * ((N : ℚ) ^ 2 - ((j : ℚ) - N) ^ 2)) =
      2 * (N : ℚ) * (2 * (N : ℚ) - 1) * (2 * (N : ℚ) + 1) / 3 := by
  have h := sum_range_affine_sq (2 * N + 1) (1 : ℚ) (-(N : ℚ))
  push_cast at h ⊢
  have hsum :
      (∑ j ∈ Finset.range (2 * N + 1), ((j : ℚ) - N) ^ 2) =
        ∑ j ∈ Finset.range (2 * N + 1),
          ((1 : ℚ) * (j : ℚ) + (-(N : ℚ))) ^ 2 := by
    apply Finset.sum_congr rfl
    intro j _
    ring
  calc
    (∑ j ∈ Finset.range (2 * N + 1),
      2 * ((N : ℚ) ^ 2 - ((j : ℚ) - N) ^ 2)) =
        2 * ((2 * (N : ℚ) + 1) * (N : ℚ) ^ 2 -
          ∑ j ∈ Finset.range (2 * N + 1),
            ((j : ℚ) - N) ^ 2) := by
          simp only [Finset.sum_sub_distrib, Finset.sum_mul,
            Finset.sum_const, Finset.card_range, nsmul_eq_mul]
          ring
    _ = 2 * (N : ℚ) * (2 * (N : ℚ) - 1) *
          (2 * (N : ℚ) + 1) / 3 := by
          rw [hsum, h]
          ring''')

          replace_once(
              'Checkerboard/PolynomialSums.lean',
              '''  convert (show
    (4 : ℚ) *
      (∑ r ∈ Finset.range (2 * m + 1),
        2 * ((m : ℚ) ^ 2 - ((r : ℚ) - m) ^ 2)) =
      8 * (m : ℚ) * (2 * (m : ℚ) - 1) *
        (2 * (m : ℚ) + 1) / 3 by rw [h]; ring) using 1
  · apply Finset.sum_congr rfl
    intro r hr
    rw [dif_pos]
    · push_cast
      ring
    · omega''',
              '''  have hscale :
      (∑ r ∈ Finset.range (2 * m + 1),
        2 * ((2 * m : ℚ) ^ 2 - ((2 * r : ℕ) : ℚ) ^ 2 +
          4 * (r : ℚ) * (m : ℚ))) =
        4 * (∑ r ∈ Finset.range (2 * m + 1),
          2 * ((m : ℚ) ^ 2 - ((r : ℚ) - m) ^ 2)) := by
    rw [Finset.mul_sum]
    apply Finset.sum_congr rfl
    intro r _
    push_cast
    ring
  convert (show
    (4 : ℚ) *
      (∑ r ∈ Finset.range (2 * m + 1),
        2 * ((m : ℚ) ^ 2 - ((r : ℚ) - m) ^ 2)) =
      8 * (m : ℚ) * (2 * (m : ℚ) - 1) *
        (2 * (m : ℚ) + 1) / 3 by rw [h]; ring) using 1
  · rw [Finset.mul_sum]
    apply Finset.sum_congr rfl
    intro r _
    push_cast
    ring''')

          replace_once(
              'Checkerboard/PolynomialSums.lean',
              '''  calc
    (∑ r ∈ Finset.range (2 * m),
      2 * ((2 * (m : ℚ)) ^ 2 -
        (((2 * r + 1 : ℕ) : ℚ) - 2 * (m : ℚ)) ^ 2)) =
        2 * ((2 * (m : ℚ)) * (2 * (m : ℚ)) ^ 2 -
          ∑ r ∈ Finset.range (2 * m),
            (2 * (r : ℚ) + (1 - 2 * (m : ℚ))) ^ 2) := by
          push_cast
          simp only [Finset.sum_sub_distrib, Finset.sum_mul,
            Finset.sum_const, Finset.card_range, nsmul_eq_mul]
          ring
    _ = 4 * (m : ℚ) * (8 * (m : ℚ) ^ 2 + 1) / 3 := by
      rw [h]
      ring''',
              '''  have hcast :
      (∑ r ∈ Finset.range (2 * m),
        2 * ((2 * (m : ℚ)) ^ 2 -
          (((2 * r + 1 : ℕ) : ℚ) - 2 * (m : ℚ)) ^ 2)) =
        ∑ r ∈ Finset.range (2 * m),
          2 * ((2 * (m : ℚ)) ^ 2 -
            (2 * (r : ℚ) + 1 - 2 * (m : ℚ)) ^ 2) := by
    apply Finset.sum_congr rfl
    intro r _
    push_cast
    ring
  rw [hcast]
  calc
    (∑ r ∈ Finset.range (2 * m),
      2 * ((2 * (m : ℚ)) ^ 2 -
        (2 * (r : ℚ) + 1 - 2 * (m : ℚ)) ^ 2)) =
        2 * ((2 * (m : ℚ)) * (2 * (m : ℚ)) ^ 2 -
          ∑ r ∈ Finset.range (2 * m),
            (2 * (r : ℚ) + (1 - 2 * (m : ℚ))) ^ 2) := by
          simp only [Finset.sum_sub_distrib, Finset.sum_mul,
            Finset.sum_const, Finset.card_range, nsmul_eq_mul]
          ring
    _ = 4 * (m : ℚ) * (8 * (m : ℚ) ^ 2 + 1) / 3 := by
      rw [h]
      ring''')

          Path('.github/workflows/repair-checkerboard-support-once.yml').unlink()
          PY
      - name: Commit repaired support modules
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Checkerboard .github/workflows/repair-checkerboard-support-once.yml
          git commit -m 'Repair checkerboard support modules for Lean 4.32'
          git push origin HEAD:migrate/checkerboard-alln-27a80067
