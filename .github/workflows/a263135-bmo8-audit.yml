name: A263135 BMO8 Lean audit

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'audits/results/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: a263135-bmo8-main
  cancel-in-progress: true

jobs:
  verify:
    name: kernel verify A263135 / BMO8
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout proof playground
        uses: actions/checkout@v6
        with:
          path: playground

      - name: Checkout exact proof source
        uses: actions/checkout@v6
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: a5fdc4e9c650ea64059f94adbacee1fb72d8ce59
          path: formal-conjectures

      - name: Run complete pinned Lean audit
        id: audit
        continue-on-error: true
        shell: bash
        run: |
          set +e
          LOG=/tmp/a263135-bmo8-audit.log
          STATUS=/tmp/a263135-bmo8-status
          PHASE=/tmp/a263135-bmo8-phase
          : > "$LOG"
          echo setup > "$PHASE"

          {
            echo "A263135 / BMO8 audit"
            echo "Proof commit: a5fdc4e9c650ea64059f94adbacee1fb72d8ce59"
            echo "Started: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

            curl -sSfL https://github.com/leanprover/elan/releases/download/v1.4.2/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
            rc=$?
            if [ "$rc" -ne 0 ]; then
              echo "elan download/install extraction failed with code $rc"
              echo "$rc" > "$STATUS"
              exit "$rc"
            fi
            ./elan-init -y --default-toolchain none
            rc=$?
            if [ "$rc" -ne 0 ]; then
              echo "elan-init failed with code $rc"
              echo "$rc" > "$STATUS"
              exit "$rc"
            fi
            export PATH="$HOME/.elan/bin:$PATH"

            cd formal-conjectures || exit 90
            echo cache > "$PHASE"
            lake exe cache unpack || true
            lake exe cache get
            rc=$?
            if [ "$rc" -ne 0 ]; then
              echo "mathlib cache setup failed with code $rc"
              echo "$rc" > "$STATUS"
              exit "$rc"
            fi

            echo placeholders > "$PHASE"
            if grep -nE '\b(sorry|admit)\b' FormalConjectures/Other/BeaverMathOlympiad8Proof.lean; then
              echo "certificate contains a placeholder"
              echo 91 > "$STATUS"
              exit 91
            fi

            echo build > "$PHASE"
            lake build FormalConjectures.Other.BeaverMathOlympiad8Proof
            rc=$?
            if [ "$rc" -ne 0 ]; then
              echo "Lean module build failed with code $rc"
              echo "$rc" > "$STATUS"
              exit "$rc"
            fi

            echo axioms > "$PHASE"
            cp FormalConjectures/Other/BeaverMathOlympiad8Proof.lean BMO8ProofAudit.lean
            printf '\n#print axioms BeaverMathOlympiad.beaver_math_olympiad_problem_8_solved\n' >> BMO8ProofAudit.lean
            lake env lean BMO8ProofAudit.lean 2>&1 | tee /tmp/a263135-bmo8-axioms.log
            rc=${PIPESTATUS[0]}
            if [ "$rc" -ne 0 ]; then
              echo "axiom audit compilation failed with code $rc"
              echo "$rc" > "$STATUS"
              exit "$rc"
            fi
            if grep -q 'sorryAx' /tmp/a263135-bmo8-axioms.log; then
              echo "solved theorem depends on sorryAx"
              echo 92 > "$STATUS"
              exit 92
            fi

            echo success > "$PHASE"
            echo 0 > "$STATUS"
            echo "Completed successfully: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } 2>&1 | tee "$LOG"

          rc=${PIPESTATUS[0]}
          if [ ! -s "$STATUS" ]; then echo "$rc" > "$STATUS"; fi
          exit "$rc"

      - name: Publish audit report
        if: always()
        shell: bash
        run: |
          code=$(cat /tmp/a263135-bmo8-status 2>/dev/null || echo 99)
          phase=$(cat /tmp/a263135-bmo8-phase 2>/dev/null || echo unknown)
          mkdir -p playground/audits/results
          {
            echo '# A263135 / BMO 8 Lean audit result'
            echo
            echo "- Proof source: \`DomTheDeveloper/formal-conjectures@a5fdc4e9c650ea64059f94adbacee1fb72d8ce59\`"
            echo "- Lean toolchain: \`leanprover/lean4:v4.27.0\`"
            echo "- Exit code: \`$code\`"
            echo "- Final phase: \`$phase\`"
            echo "- Workflow run: \`$GITHUB_RUN_ID\`"
            echo "- Recorded: \`$(date -u +%Y-%m-%dT%H:%M:%SZ)\`"
            echo
            if [ "$code" = 0 ]; then
              echo '**VERIFIED:** the certificate contains no placeholders, the exact module builds, and the solved theorem axiom report contains no `sorryAx`.'
            else
              echo '**NOT VERIFIED:** the audit failed. The exact diagnostic tail follows.'
            fi
            echo
            echo '```text'
            tail -n 250 /tmp/a263135-bmo8-audit.log 2>/dev/null || true
            echo '```'
          } > playground/audits/results/A263135-BMO8.md

          git -C playground config user.name github-actions
          git -C playground config user.email github-actions@github.com
          git -C playground add audits/results/A263135-BMO8.md
          git -C playground commit -m 'audit: record A263135 BMO8 Lean result [skip ci]' || true
          git -C playground push origin HEAD:main

          test "$code" = 0
