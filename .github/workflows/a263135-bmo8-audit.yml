name: A263135 BMO8 Lean audit

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: a263135-bmo8-main
  cancel-in-progress: true

jobs:
  verify:
    name: kernel verify A263135 / BMO8
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout proof source
        uses: actions/checkout@v6
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: a5fdc4e9c650ea64059f94adbacee1fb72d8ce59
          path: formal-conjectures

      - name: Install elan
        run: |
          set -o pipefail
          curl -sSfL https://github.com/leanprover/elan/releases/download/v1.4.2/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Get pinned mathlib cache
        working-directory: formal-conjectures
        run: |
          lake exe cache unpack || true
          lake exe cache get

      - name: Reject placeholders in certificate
        working-directory: formal-conjectures
        run: |
          if grep -nE '\b(sorry|admit)\b' FormalConjectures/Other/BeaverMathOlympiad8Proof.lean; then
            echo 'Certificate contains a placeholder.' >&2
            exit 1
          fi

      - name: Build exact certificate
        working-directory: formal-conjectures
        run: lake build FormalConjectures.Other.BeaverMathOlympiad8Proof

      - name: Audit theorem axioms
        working-directory: formal-conjectures
        run: |
          set -o pipefail
          cp FormalConjectures/Other/BeaverMathOlympiad8Proof.lean BMO8ProofAudit.lean
          printf '\n#print axioms BeaverMathOlympiad.beaver_math_olympiad_problem_8_solved\n' >> BMO8ProofAudit.lean
          lake env lean BMO8ProofAudit.lean 2>&1 | tee BMO8ProofAudit.log
          if grep -q 'sorryAx' BMO8ProofAudit.log; then
            echo 'Solved theorem depends on sorryAx.' >&2
            exit 1
          fi
